{{- if and .Values.keyManager.enabled .Values.keyManager.nebariApp.enabled }}
{{- if not .Values.frontend.enabled }}
{{- fail "keyManager.nebariApp.enabled=true requires frontend.enabled=true: the NebariApp (and its landing-page healthcheck on /) targets the -frontend Service, which is only rendered when frontend.enabled=true. For an API-only install, set keyManager.nebariApp.enabled=false." }}
{{- end }}
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: {{ include "nebari-llm-serving.fullname" . }}-key-manager
  namespace: {{ include "nebari-llm-serving.operatorNamespace" . }}
  labels:
    {{- include "nebari-llm-serving.labels" . | nindent 4 }}
spec:
  hostname: {{ required "keyManager.nebariApp.hostname is required when keyManager.nebariApp.enabled=true" .Values.keyManager.nebariApp.hostname | quote }}
  gateway: {{ .Values.keyManager.nebariApp.gateway | quote }}
  # The NebariApp targets the frontend nginx Service, which serves the React SPA
  # and reverse-proxies /api/* to the key-manager over cluster DNS. The
  # key-manager Service is never exposed through the gateway.
  service:
    name: {{ include "nebari-llm-serving.fullname" . }}-frontend
    port: {{ .Values.frontend.service.port }}
  {{- with .Values.keyManager.nebariApp.routing }}
  # routing is passed through verbatim from values so consumers can set
  # routes / publicRoutes / tls / annotations without further chart edits.
  # Required if you want the nebari-operator to provision an HTTPRoute and
  # cert-manager Certificate for the key-manager hostname; without it the
  # operator marks RoutingReady=False and skips both.
  routing:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  # Model B (SPA-managed Keycloak): auth is performed client-side by keycloak-js
  # (PKCE/S256) in the browser and validated in-process by the key-manager
  # against Keycloak's JWKS. enforceAtGateway stays false, so the operator
  # provisions the public SPA client but emits no gateway SecurityPolicy.
  auth:
    enabled: true
    # Hardcoded to keycloak: the key-manager only validates Keycloak-minted
    # tokens today. generic-oidc support is tracked in nebari-dev/#61.
    provider: keycloak
    enforceAtGateway: false
    scopes:
      {{- toYaml .Values.keyManager.nebariApp.auth.scopes | nindent 6 }}
    # The groups mapper ensures access tokens carry group claims so the
    # key-manager can filter models by group membership. claim.name is derived
    # from the same value the key-manager reads (auth.oidc.groupsClaim, wired to
    # LLM_OIDC_GROUPS_CLAIM) so overriding the claim name can't drift the mapper
    # and the reader out of sync.
    keycloakConfig:
      protocolMappers:
        - name: group-membership
          protocolMapper: oidc-group-membership-mapper
          config:
            claim.name: {{ .Values.auth.oidc.groupsClaim | quote }}
            full.path: "false"
            id.token.claim: "true"
            access.token.claim: "true"
            userinfo.token.claim: "true"
    # Public Keycloak client for the React SPA (PKCE, no secret). The client the
    # operator provisions here must match the client the SPA presents
    # (frontend.keycloak.clientId, rendered into config.json) and the one the
    # key-manager pins `azp` to. To keep those from drifting, the client ID
    # defaults to frontend.keycloak.clientId; spaClientId is only an explicit
    # override on top of that. When both are empty no clientId is emitted and the
    # operator generates the <namespace>-<nebariapp-name>-spa convention - which is
    # also what config.json and the azp default fall back to, so they still agree.
    spaClient:
      enabled: true
      {{- with (.Values.keyManager.nebariApp.auth.spaClientId | default .Values.frontend.keycloak.clientId) }}
      clientId: {{ . | quote }}
      {{- end }}
  {{- with .Values.keyManager.nebariApp.landingPage }}
  landingPage:
    enabled: {{ .enabled }}
    {{- if .enabled }}
    displayName: {{ required "keyManager.nebariApp.landingPage.displayName is required when landingPage is enabled" .displayName | quote }}
    {{- with .description }}
    description: {{ . | quote }}
    {{- end }}
    {{- with .category }}
    category: {{ . | quote }}
    {{- end }}
    {{- with .icon }}
    icon: {{ . | quote }}
    {{- end }}
    {{- with .priority }}
    priority: {{ . }}
    {{- end }}
    {{- with .healthCheck }}
    {{- /* Lets the Nebari landing page actively probe the key-manager so its
       tile shows Healthy/Unhealthy instead of "Unknown"; the landing webapi
       probes http://<service>.<namespace>:<port><path>. */}}
    healthCheck:
      enabled: {{ .enabled | default false }}
      {{- with .path }}
      path: {{ . | quote }}
      {{- end }}
      {{- with .port }}
      port: {{ . }}
      {{- end }}
      {{- with .intervalSeconds }}
      intervalSeconds: {{ . }}
      {{- end }}
      {{- with .timeoutSeconds }}
      timeoutSeconds: {{ . }}
      {{- end }}
    {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
