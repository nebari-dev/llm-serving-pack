apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "nebari-llm-serving.fullname" . }}-validating-webhook
  labels:
    {{- include "nebari-llm-serving.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ include "nebari-llm-serving.operatorNamespace" . }}/{{ include "nebari-llm-serving.fullname" . }}-webhook-cert
webhooks:
  - name: vllmmodel-v1alpha1.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "nebari-llm-serving.fullname" . }}-webhook-service
        namespace: {{ include "nebari-llm-serving.operatorNamespace" . }}
        path: /validate-llm-nebari-dev-v1alpha1-llmmodel
    failurePolicy: Fail
    rules:
      - apiGroups: ["llm.nebari.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["llmmodels"]
    sideEffects: None
  - name: vpassthroughmodel-v1alpha1.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "nebari-llm-serving.fullname" . }}-webhook-service
        namespace: {{ include "nebari-llm-serving.operatorNamespace" . }}
        path: /validate-llm-nebari-dev-v1alpha1-passthroughmodel
    failurePolicy: Fail
    rules:
      - apiGroups: ["llm.nebari.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["passthroughmodels"]
    sideEffects: None
