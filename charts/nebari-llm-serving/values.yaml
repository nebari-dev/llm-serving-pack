platform:
  # baseDomain is REQUIRED - the base domain for the Nebari deployment
  baseDomain: ""
  gateway:
    external:
      name: nebari-gateway
      namespace: envoy-gateway-system
    internal:
      name: nebari-internal-gateway
      namespace: envoy-gateway-system

auth:
  oidc:
    # issuerURL - the OIDC issuer URL. When set, this static value is used
    # directly. When empty (default), the issuer URL is read from a Kubernetes
    # Secret via secretKeyRef instead - this is the expected integration path
    # when the nebari-operator provisions the OIDC client with auth enabled.
    issuerURL: ""
    # existingSecret - name of the Secret containing the "issuer-url" key.
    # Defaults to "<release-fullname>-oidc-client", which matches the secret
    # the nebari-operator creates when a NebariApp has auth.enabled: true.
    existingSecret: ""
    groupsClaim: groups
    audience: ""
    cookiePrefix: IdToken

envoyAIGateway:
  # install: if true, installs the Envoy AI Gateway (not yet implemented)
  install: false

keyManager:
  enabled: true
  image:
    repository: ghcr.io/nebari-dev/nebari-llm-serving-pack/key-manager
    tag: latest
    pullPolicy: Always
  auditInterval: 5m
  oidcUserinfoURL: ""
  # nebariApp - opt the key-manager UI into external exposure via the
  # nebari-operator. When enabled, the operator reconciles a NebariApp CR
  # into an HTTPRoute, cert-manager Certificate, per-app Gateway HTTPS
  # listener, and (optional) Keycloak OIDC client + landing-page tile.
  #
  # The chart owns the `service` field (computed from the release name);
  # everything else flows through `spec` verbatim so deployments can
  # configure routing/auth/landingPage/etc. without chart changes. See:
  #   https://github.com/nebari-dev/nebari-operator/blob/main/api/v1/nebariapp_types.go
  nebariApp:
    enabled: true
    # spec is rendered as-is into the NebariApp CR's spec. The chart adds
    # a `service:` block computed from the release name and merges this
    # map alongside it. At minimum, set spec.hostname (the CRD requires
    # it). Routing/auth/landingPage/etc. are deployment-specific and
    # should be set in the consuming Helm release values.
    spec: {}

operator:
  image:
    repository: ghcr.io/nebari-dev/nebari-llm-serving-pack/operator
    tag: latest
    pullPolicy: Always

# Namespace where API keys (Secrets) are stored
apiKeysNamespace: llm-api-keys

defaults:
  serving:
    image: ghcr.io/llm-d/llm-d-cuda:v0.6.0
  storage:
    storageClassName: ""
  monitoring:
    enabled: true
