---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: llmmodels.llm.nebari.dev
spec:
  group: llm.nebari.dev
  names:
    kind: LLMModel
    listKind: LLMModelList
    plural: llmmodels
    singular: llmmodel
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.model.name
      name: Model
      type: string
    - jsonPath: .status.replicas.ready
      name: Replicas
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: LLMModel is the Schema for the llmmodels API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of LLMModel
            properties:
              access:
                description: access controls who can use this model
                properties:
                  groups:
                    description: groups lists OIDC groups that can access this model
                    items:
                      type: string
                    type: array
                required:
                - groups
                type: object
              advanced:
                description: advanced provides escape hatches for power users
                properties:
                  inferencePoolOverrides:
                    description: inferencePoolOverrides are raw overrides merged into
                      the InferencePool spec
                    x-kubernetes-preserve-unknown-fields: true
                  vllmOverrides:
                    description: vllmOverrides are raw overrides merged into the vLLM
                      Deployment spec
                    x-kubernetes-preserve-unknown-fields: true
                type: object
              endpoints:
                description: endpoints configures external and internal access
                properties:
                  external:
                    description: external configures the external (API key) endpoint
                    properties:
                      enabled:
                        default: true
                        description: enabled controls whether the external endpoint
                          is created
                        type: boolean
                      subdomain:
                        description: subdomain overrides the auto-generated subdomain
                        type: string
                    type: object
                  internal:
                    description: internal configures the internal (JWT) endpoint
                    properties:
                      enabled:
                        default: true
                        description: enabled controls whether the internal endpoint
                          is created
                        type: boolean
                    type: object
                type: object
              model:
                description: model specifies the LLM to serve
                properties:
                  authSecretName:
                    description: authSecretName references a K8s Secret containing
                      HF_TOKEN (huggingface only)
                    type: string
                  image:
                    description: image is the OCI image containing the model (oci
                      source only)
                    type: string
                  name:
                    description: name is the model identifier (e.g., "mistralai/Devstral-Small-2505")
                    type: string
                  preload:
                    description: preload uses an init container to download the model
                      before vLLM starts
                    type: boolean
                  revision:
                    description: revision pins a specific HF commit hash or tag for
                      reproducible deployments
                    type: string
                  source:
                    description: source is where to load the model from
                    enum:
                    - huggingface
                    - oci
                    type: string
                  storage:
                    description: storage configures where model files are stored
                    properties:
                      size:
                        description: size is the storage size (e.g., "200Gi")
                        type: string
                      storageClassName:
                        description: storageClassName overrides the default storage
                          class
                        type: string
                      type:
                        default: pvc
                        description: type is the volume type (pvc or emptyDir)
                        enum:
                        - pvc
                        - emptyDir
                        type: string
                    type: object
                required:
                - name
                - source
                type: object
              resources:
                description: resources specifies compute requirements
                properties:
                  gpu:
                    description: gpu specifies GPU requirements
                    properties:
                      count:
                        description: count is the number of GPUs required
                        format: int32
                        type: integer
                      type:
                        default: nvidia
                        description: type is the GPU type (e.g., "nvidia")
                        type: string
                    required:
                    - count
                    - type
                    type: object
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: limits specifies CPU/memory resource limits
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: requests specifies CPU/memory resource requests
                    type: object
                required:
                - gpu
                type: object
              serving:
                description: serving configures the vLLM serving layer
                properties:
                  dataParallelism:
                    default: 1
                    description: dataParallelism controls data parallelism
                    format: int32
                    type: integer
                  image:
                    description: image overrides the default vLLM container image
                    type: string
                  monitoring:
                    description: monitoring configures Prometheus monitoring
                    properties:
                      enabled:
                        description: enabled controls whether a PodMonitor is created
                        type: boolean
                    type: object
                  replicas:
                    default: 1
                    description: replicas is the number of serving replicas
                    format: int32
                    type: integer
                  tensorParallelism:
                    description: tensorParallelism controls tensor parallelism (defaults
                      to gpu.count)
                    format: int32
                    type: integer
                  vllmArgs:
                    description: vllmArgs are additional arguments passed to vLLM
                    items:
                      type: string
                    type: array
                type: object
            required:
            - access
            - model
            - resources
            type: object
          status:
            description: status defines the observed state of LLMModel
            properties:
              conditions:
                description: conditions represent the current state of the resource
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endpoints:
                description: endpoints contains the actual endpoint URLs
                properties:
                  external:
                    type: string
                  internal:
                    type: string
                type: object
              modelSize:
                description: modelSize is the actual model size after download
                type: string
              observedGeneration:
                description: observedGeneration is the last generation reconciled
                format: int64
                type: integer
              phase:
                description: phase is the current lifecycle phase
                enum:
                - Pending
                - Downloading
                - Starting
                - Ready
                - Degraded
                - Error
                type: string
              replicas:
                description: replicas tracks ready vs desired replica counts
                properties:
                  desired:
                    format: int32
                    type: integer
                  ready:
                    format: int32
                    type: integer
                required:
                - desired
                - ready
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
