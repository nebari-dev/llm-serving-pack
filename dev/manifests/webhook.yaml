---
apiVersion: v1
kind: Service
metadata:
  name: llm-operator-webhook-service
  namespace: llm-operator-system
spec:
  ports:
    - port: 443
      targetPort: 9443
      protocol: TCP
  selector:
    app: llm-operator
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: llm-operator-validating-webhook
  annotations:
    cert-manager.io/inject-ca-from: llm-operator-system/llm-operator-webhook-cert
webhooks:
  - name: vllmmodel-v1alpha1.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: llm-operator-webhook-service
        namespace: llm-operator-system
        path: /validate-llm-nebari-dev-v1alpha1-llmmodel
    failurePolicy: Fail
    rules:
      - apiGroups: ["llm.nebari.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["llmmodels"]
    sideEffects: None
  - name: vpassthroughmodel-v1alpha1.kb.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: llm-operator-webhook-service
        namespace: llm-operator-system
        path: /validate-llm-nebari-dev-v1alpha1-passthroughmodel
    failurePolicy: Fail
    rules:
      - apiGroups: ["llm.nebari.dev"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["passthroughmodels"]
    sideEffects: None
