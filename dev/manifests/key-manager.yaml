---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-key-manager
  namespace: llm-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llm-key-manager-models
rules:
  - apiGroups: ["llm.nebari.dev"]
    resources: ["llmmodels", "passthroughmodels"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llm-key-manager-models
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llm-key-manager-models
subjects:
  - kind: ServiceAccount
    name: llm-key-manager
    namespace: llm-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  # Per #59 the API-key Secrets and metadata ConfigMaps live in the
  # operator's own namespace alongside the LLMModels and SecurityPolicies
  # that reference them. The key-manager only needs RBAC on its own
  # namespace.
  name: llm-key-manager
  namespace: llm-operator-system
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llm-key-manager
  namespace: llm-operator-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: llm-key-manager
subjects:
  - kind: ServiceAccount
    name: llm-key-manager
    namespace: llm-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-key-manager
  namespace: llm-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-key-manager
  template:
    metadata:
      labels:
        app: llm-key-manager
    spec:
      serviceAccountName: llm-key-manager
      containers:
        - name: key-manager
          image: llm-key-manager:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            # Per #59 the API-key Secrets live in the operator's own
            # namespace - use the downward API to pick that up.
            - name: LLM_API_KEYS_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LLM_OIDC_GROUPS_CLAIM
              value: "groups"
            - name: LLM_AUTH_COOKIE_PREFIX
              value: "IdToken"
            - name: LLM_LISTEN_ADDR
              value: ":8080"
            # Dev mode: there is no Keycloak or gateway OIDC layer on the kind
            # cluster, so bypass auth and inject a fixed identity. The UI and
            # /api/* then work behind a plain `make ui` port-forward. Never set
            # this in a real deployment. See nebari-dev/llm-serving-pack#114.
            - name: LLM_DEV_MODE
              value: "true"
            - name: LLM_DEV_USER
              value: "dev"
            - name: LLM_DEV_GROUPS
              value: "llm"
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: llm-key-manager
  namespace: llm-operator-system
spec:
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: llm-key-manager
