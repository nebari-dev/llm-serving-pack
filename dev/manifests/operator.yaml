---
apiVersion: v1
kind: Namespace
metadata:
  name: llm-operator-system
  labels:
    # Per #59 LLMModels live in the operator's own namespace, so this
    # namespace also needs the managed label that the validating webhook
    # checks for.
    nebari.dev/managed: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-operator
  namespace: llm-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llm-operator
rules:
  - apiGroups: ["llm.nebari.dev"]
    resources: ["llmmodels"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["llm.nebari.dev"]
    resources: ["llmmodels/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["llm.nebari.dev"]
    resources: ["llmmodels/finalizers"]
    verbs: ["update"]
  - apiGroups: ["llm.nebari.dev"]
    resources: ["passthroughmodels"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["llm.nebari.dev"]
    resources: ["passthroughmodels/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["llm.nebari.dev"]
    resources: ["passthroughmodels/finalizers"]
    verbs: ["update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "serviceaccounts", "persistentvolumeclaims", "secrets", "configmaps", "namespaces", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["inference.networking.k8s.io"]
    resources: ["inferencepools"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # The operator creates a per-model EPP Role granting these
  # inference.networking.x-k8s.io permissions (see reconcilers/inferencepool.go).
  # RBAC privilege-escalation prevention requires the operator to already hold
  # any permission it grants, so it must carry them here too (mirrors the Helm
  # chart ClusterRole; #121).
  - apiGroups: ["inference.networking.x-k8s.io"]
    resources: ["inferenceobjectives", "inferencemodelrewrites", "inferencepools", "inferencepoolimports"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["aigateway.envoyproxy.io"]
    resources: ["aigatewayroutes", "aiservicebackends", "backendsecuritypolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.envoyproxy.io"]
    resources: ["securitypolicies", "backends"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # PassthroughModel provider TLS validation toward the external provider.
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["backendtlspolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["referencegrants"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["podmonitors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Shared-TLS reconciler: issues the cert covering llm/llm-internal via the
  # selfsigned-issuer ClusterIssuer (see cert-manager-config.yaml) and patches
  # HTTPS listeners onto the shared Gateways.
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llm-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llm-operator
subjects:
  - kind: ServiceAccount
    name: llm-operator
    namespace: llm-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-operator
  namespace: llm-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-operator
  template:
    metadata:
      labels:
        app: llm-operator
    spec:
      serviceAccountName: llm-operator
      containers:
        - name: manager
          image: llm-operator:dev
          imagePullPolicy: Never
          env:
            - name: LLM_BASE_DOMAIN
              value: "local"
            - name: LLM_EXTERNAL_GATEWAY_NAME
              value: "nebari-gateway"
            - name: LLM_EXTERNAL_GATEWAY_NAMESPACE
              value: "envoy-gateway-system"
            - name: LLM_INTERNAL_GATEWAY_NAME
              value: "nebari-internal-gateway"
            - name: LLM_INTERNAL_GATEWAY_NAMESPACE
              value: "envoy-gateway-system"
            # Issue the shared llm.local / llm-internal.local cert via the
            # local self-signed ClusterIssuer (cert-manager-config.yaml) so the
            # operator can patch HTTPS listeners onto the gateways with no ACME.
            - name: LLM_CLUSTER_ISSUER_NAME
              value: "selfsigned-issuer"
            - name: LLM_OIDC_ISSUER_URL
              value: "https://keycloak.local/realms/nebari"
            - name: LLM_OIDC_GROUPS_CLAIM
              value: "groups"
            - name: ENABLE_WEBHOOKS
              value: "true"
            # POD_NAMESPACE feeds the webhook's same-namespace check on
            # LLMModel CRs (#59).
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          # The validating webhook binds 9443 only after controller-runtime
          # loads the mounted serving cert. Gate readiness on that port so
          # `kubectl rollout status` in `make deploy` does not return before the
          # webhook can accept PassthroughModel creates (the manager's /readyz
          # is only a ping and goes green before the webhook is serving).
          readinessProbe:
            tcpSocket:
              port: 9443
            initialDelaySeconds: 2
            periodSeconds: 2
          volumeMounts:
            - name: cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: cert
          secret:
            secretName: webhook-server-cert
