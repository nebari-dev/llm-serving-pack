---
apiVersion: v1
kind: Namespace
metadata:
  name: llm-operator-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: llm-api-keys
---
apiVersion: v1
kind: Namespace
metadata:
  name: llm-serving
  labels:
    nebari.dev/managed: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-operator
  namespace: llm-operator-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llm-operator
rules:
  - apiGroups: ["llm.nebari.dev"]
    resources: ["llmmodels"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["llm.nebari.dev"]
    resources: ["llmmodels/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["llm.nebari.dev"]
    resources: ["llmmodels/finalizers"]
    verbs: ["update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services", "serviceaccounts", "persistentvolumeclaims", "secrets", "configmaps", "namespaces", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["inference.networking.k8s.io"]
    resources: ["inferencepools"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["aigateway.envoyproxy.io"]
    resources: ["aigatewayroutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.envoyproxy.io"]
    resources: ["securitypolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["referencegrants"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["podmonitors"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llm-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llm-operator
subjects:
  - kind: ServiceAccount
    name: llm-operator
    namespace: llm-operator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-operator
  namespace: llm-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-operator
  template:
    metadata:
      labels:
        app: llm-operator
    spec:
      serviceAccountName: llm-operator
      containers:
        - name: manager
          image: llm-operator:dev
          imagePullPolicy: Never
          env:
            - name: LLM_BASE_DOMAIN
              value: "llm.local"
            - name: LLM_EXTERNAL_GATEWAY_NAME
              value: "nebari-gateway"
            - name: LLM_EXTERNAL_GATEWAY_NAMESPACE
              value: "envoy-gateway-system"
            - name: LLM_INTERNAL_GATEWAY_NAME
              value: "nebari-internal-gateway"
            - name: LLM_INTERNAL_GATEWAY_NAMESPACE
              value: "envoy-gateway-system"
            - name: LLM_OIDC_ISSUER_URL
              value: "https://keycloak.llm.local/realms/nebari"
            - name: LLM_OIDC_GROUPS_CLAIM
              value: "groups"
            - name: LLM_API_KEYS_NAMESPACE
              value: "llm-api-keys"
            - name: ENABLE_WEBHOOKS
              value: "true"
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          volumeMounts:
            - name: cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: cert
          secret:
            secretName: webhook-server-cert
