baseURL = "https://nebari-dev.github.io/nebari-llm-serving-pack/"
languageCode = "en-us"
title = "LLM Serving Pack"
enableGitInfo = true

# Theme imported as a Hugo Module, pinned to a release tag in go.mod (currently v0.1.0).
[module]
  [[module.imports]]
    path = "github.com/nebari-dev/nebari-hugo-theme"

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "Kubernetes operator for serving LLMs on Nebari via llm-d, with per-model OIDC access control, API key management, and Envoy AI Gateway integration."
  repo = "https://github.com/nebari-dev/nebari-llm-serving-pack"
  editBase = "https://github.com/nebari-dev/nebari-llm-serving-pack/edit/main/docs/site/content"
  search = true

  [[params.tabs]]
    name = "Docs"
    url  = "/"

  [[params.sidebar]]
    heading = "Documentation"
    [[params.sidebar.items]]
      label = "Quickstart"
      url   = "/quickstart/"
    [[params.sidebar.items]]
      label = "Installation"
      url   = "/installation/"
    [[params.sidebar.items]]
      label = "Local Development"
      url   = "/local-development/"
    [[params.sidebar.items]]
      label = "Shared Storage"
      url   = "/shared-storage/"
    [[params.sidebar.items]]
      label = "Troubleshooting"
      url   = "/troubleshooting/"

  [[params.sidebar]]
    heading = "Reference"
    [[params.sidebar.items]]
      label = "Configuration"
      url   = "/configuration/"
    [[params.sidebar.items]]
      label = "Architecture"
      url   = "/architecture/"
    [[params.sidebar.items]]
      label = "CI/CD and Releasing"
      url   = "/cicd-and-releasing/"
