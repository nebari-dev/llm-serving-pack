---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - llm.nebari.dev
  resources:
  - llmmodels
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - llm.nebari.dev
  resources:
  - llmmodels/finalizers
  verbs:
  - update
- apiGroups:
  - llm.nebari.dev
  resources:
  - llmmodels/status
  verbs:
  - get
  - patch
  - update
