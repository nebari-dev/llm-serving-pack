# .github/workflows/docs-astro.yml
name: Docs (Astro bake-off)
on:
  push:
    branches: [docs-site-astro]
    paths: ['docs/astro/**', '.github/workflows/docs-astro.yml']
  pull_request:
    paths: ['docs/astro/**', '.github/workflows/docs-astro.yml']
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs/astro
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs/astro/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: astro-docs-dist
          path: docs/astro/dist
