name: Build Docker Images

on:
  push:
    branches: [main]
    paths:
      - "operator/**"
      - "key-manager/**"
      - "frontend/**"
      - "model-downloader/**"
      - ".github/workflows/build-images.yaml"
      # The release workflow pins images to sha-<release-commit>, so the
      # release commit (a Chart.yaml bump) must produce images with that
      # sha. Building here on the bump ensures they exist. This runs in
      # parallel with the release workflow (no hard gate in v1), so images
      # are published around the same time the chart becomes consumable.
      - "charts/nebari-llm-serving/Chart.yaml"
  pull_request:
    paths:
      - "operator/**"
      - "key-manager/**"
      - "frontend/**"
      - "model-downloader/**"
  workflow_dispatch:

# Each job grants id-token + attestations so the reusable pack-build-image
# workflow can keyless-sign + attest (provenance + SBOM) the images it builds.
# These scopes are inert until the signing-enabled pack-build-image ships under
# @v1 (see nebari-dev/.github#46); PR builds still use push:false and are
# fork-safe (signing is skipped when nothing is pushed).
jobs:
  operator:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: nebari-dev/.github/.github/workflows/pack-build-image.yaml@v1
    with:
      image: operator
      context: operator/
      push: ${{ github.event_name != 'pull_request' }}
    secrets:
      QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}

  model-downloader:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: nebari-dev/.github/.github/workflows/pack-build-image.yaml@v1
    with:
      image: model-downloader
      context: model-downloader/
      push: ${{ github.event_name != 'pull_request' }}
    secrets:
      QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}

  key-manager:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: nebari-dev/.github/.github/workflows/pack-build-image.yaml@v1
    with:
      image: key-manager
      context: "."
      dockerfile: key-manager/Dockerfile
      push: ${{ github.event_name != 'pull_request' }}
    secrets:
      QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}

  frontend:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: nebari-dev/.github/.github/workflows/pack-build-image.yaml@v1
    with:
      image: frontend
      context: frontend/
      push: ${{ github.event_name != 'pull_request' }}
    secrets:
      QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
