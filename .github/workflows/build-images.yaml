name: Build Docker Images

on:
  push:
    branches: [main]
    paths:
      - "operator/**"
      - "key-manager/**"
      - "frontend/**"
      - "model-downloader/**"
      - ".github/workflows/build-images.yaml"
  pull_request:
    paths:
      - "operator/**"
      - "key-manager/**"
      - "frontend/**"
      - "model-downloader/**"
  workflow_dispatch:

jobs:
  operator:
    # TODO: re-pin to the v1 tag before this PR merges (bring-up ref only).
    uses: nebari-dev/.github/.github/workflows/pack-build-image.yaml@feat/pack-release-workflows
    with:
      image: operator
      context: operator/
      push: ${{ github.event_name != 'pull_request' }}
    secrets:
      QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}

  model-downloader:
    # TODO: re-pin to the v1 tag before this PR merges (bring-up ref only).
    uses: nebari-dev/.github/.github/workflows/pack-build-image.yaml@feat/pack-release-workflows
    with:
      image: model-downloader
      context: model-downloader/
      push: ${{ github.event_name != 'pull_request' }}
    secrets:
      QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}

  key-manager:
    # TODO: re-pin to the v1 tag before this PR merges (bring-up ref only).
    uses: nebari-dev/.github/.github/workflows/pack-build-image.yaml@feat/pack-release-workflows
    with:
      image: key-manager
      context: "."
      dockerfile: key-manager/Dockerfile
      push: ${{ github.event_name != 'pull_request' }}
    secrets:
      QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}

  frontend:
    # TODO: re-pin to the v1 tag before this PR merges (bring-up ref only).
    uses: nebari-dev/.github/.github/workflows/pack-build-image.yaml@feat/pack-release-workflows
    with:
      image: frontend
      context: frontend/
      push: ${{ github.event_name != 'pull_request' }}
    secrets:
      QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
