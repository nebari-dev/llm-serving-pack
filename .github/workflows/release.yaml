name: Release Chart

on:
  push:
    branches: [main]
    paths:
      - "charts/nebari-llm-serving/Chart.yaml"

jobs:
  release:
    # TODO: re-pin to the v1 tag before this PR merges (bring-up ref only).
    uses: nebari-dev/.github/.github/workflows/pack-release.yaml@feat/pack-release-workflows
    with:
      chart-path: charts/nebari-llm-serving
      chart-name: nebari-llm-serving
      tag-paths: |
        operator.image.tag
        keyManager.image.tag
        frontend.image.tag
        modelDownloader.image.tag
    secrets:
      NEBARI_HELM_REPO_TOKEN: ${{ secrets.NEBARI_HELM_REPO_TOKEN }}
