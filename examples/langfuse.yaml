# Self-hosted Langfuse for per-user LLM token-usage observability.
#
# Langfuse is the OTLP trace backend for this pack's GenAI tracing (see
# examples/envoy-ai-gateway.yaml). This file deploys Langfuse v3 (chart
# langfuse/langfuse 1.5.36, appVersion 3.x) via ArgoCD, with bundled Postgres,
# ClickHouse, Redis, and MinIO (S3). PVCs use the cluster's default
# StorageClass (Longhorn on a NIC deploy).
#
# v1 scope: single-replica datastores. HA, external managed datastores, and
# backups are out of scope.
#
# ── PREREQUISITE: create the app-secrets Secret (do NOT commit real values) ──
#
#   kubectl create namespace langfuse
#   kubectl -n langfuse create secret generic langfuse-app-secrets \
#     --from-literal=nextauth-secret="$(openssl rand -base64 32)" \
#     --from-literal=salt="$(openssl rand -base64 32)" \
#     --from-literal=encryption-key="$(openssl rand -hex 32)" \
#     --from-literal=postgres-password="$(openssl rand -hex 24)" \
#     --from-literal=clickhouse-password="$(openssl rand -hex 24)" \
#     --from-literal=redis-password="$(openssl rand -hex 24)" \
#     --from-literal=minio-root-password="$(openssl rand -hex 24)"
#
# encryption-key MUST be 64 hex chars (openssl rand -hex 32). The ArgoCD app
# below references this Secret; it never contains secret material itself.
#
# Replace every REPLACE-baseDomain before applying.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: langfuse
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  source:
    chart: langfuse
    repoURL: https://langfuse.github.io/langfuse-k8s
    targetRevision: 1.5.36
    helm:
      releaseName: langfuse
      values: |
        # Stable resource names: web Service becomes "langfuse-web".
        fullnameOverride: langfuse
        langfuse:
          # Canonical site URL — used by NextAuth for callbacks. Must match the
          # NebariApp hostname below.
          nextauth:
            url: https://langfuse.REPLACE-baseDomain
            secret:
              secretKeyRef:
                name: langfuse-app-secrets
                key: nextauth-secret
          salt:
            secretKeyRef:
              name: langfuse-app-secrets
              key: salt
          encryptionKey:
            secretKeyRef:
              name: langfuse-app-secrets
              key: encryption-key
        postgresql:
          deploy: true
          auth:
            existingSecret: langfuse-app-secrets
            secretKeys:
              userPasswordKey: postgres-password
              adminPasswordKey: postgres-password
        clickhouse:
          deploy: true
          auth:
            existingSecret: langfuse-app-secrets
            existingSecretKey: clickhouse-password
        redis:
          deploy: true
          auth:
            existingSecret: langfuse-app-secrets
            existingSecretPasswordKey: redis-password
        s3:
          deploy: true
          auth:
            existingSecret: langfuse-app-secrets
            rootPasswordSecretKey: minio-root-password

  destination:
    server: https://kubernetes.default.svc
    namespace: langfuse

  syncPolicy:
    # Opt the langfuse namespace into Nebari management so the NebariApp below
    # (which exposes the UI) is reconciled by the nebari-operator rather than
    # rejected with NamespaceNotOptedIn.
    managedNamespaceMetadata:
      labels:
        nebari.dev/managed: "true"
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
# Exposes the Langfuse web UI via the shared gateway with Keycloak OIDC auth and
# a Nebari landing-page tile. Mirrors the key-manager NebariApp pattern. Lives
# in the langfuse namespace so its same-namespace service reference resolves;
# the namespace is opted into Nebari management by the Application above.
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: langfuse
  namespace: langfuse
spec:
  hostname: langfuse.REPLACE-baseDomain
  gateway: nebari-gateway
  service:
    name: langfuse-web
    port: 3000
  routing:
    publicRoutes: []
  auth:
    enabled: true
    provider: keycloak
    provisionClient: true
    scopes:
      - openid
      - profile
      - email
  landingPage:
    enabled: true
    displayName: Langfuse
    description: LLM observability — per-user token usage and traces
    category: Monitoring
    healthCheck:
      enabled: true
      path: /api/public/health
      port: 3000
      intervalSeconds: 30
      timeoutSeconds: 5
