# Interface Secret consumed by the Envoy AI Gateway extProc (see
# examples/envoy-ai-gateway.yaml) to export GenAI traces to Langfuse.
# Create it in the AI Gateway's namespace (envoy-ai-gateway-system).
#
#   endpoint     - Langfuse OTLP ingest URL, e.g.
#                  https://langfuse.<baseDomain>/api/public/otel
#   otlp-headers - OTLP exporter headers in W3C key=value form. Langfuse
#                  authenticates its OTLP endpoint with HTTP Basic using a
#                  project's public:secret API-key pair. Build it with:
#                      printf 'pk-lf-...:sk-lf-...' | base64
#                  then set: Authorization=Basic <that-base64>
#
# The project keys only exist after you create an org + project in the Langfuse
# UI; see the "Langfuse project-key bootstrap" runbook in
# docs/install-production.md.
#
# Replace both values, then:
#   kubectl apply -n envoy-ai-gateway-system -f langfuse-otlp-credentials.yaml
#   kubectl rollout restart deploy -n envoy-ai-gateway-system -l app.kubernetes.io/name=ai-gateway-extproc
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-otlp-credentials
  namespace: envoy-ai-gateway-system
type: Opaque
stringData:
  endpoint: "https://langfuse.REPLACE-baseDomain/api/public/otel"
  otlp-headers: "Authorization=Basic REPLACE-base64-of-pk:sk"
