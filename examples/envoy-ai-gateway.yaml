# Envoy AI Gateway ArgoCD Applications.
#
# The AI Gateway is shipped as TWO separate Helm charts:
#   1. ai-gateway-crds-helm  - CRDs (AIGatewayRoute, AIServiceBackend,
#                              BackendSecurityPolicy, GatewayConfig, MCPRoute)
#   2. ai-gateway-helm       - Controller + webhooks
#
# Prerequisites:
#   - Kubernetes 1.32+
#   - Envoy Gateway v1.6+ installed (nic installs Envoy Gateway as a
#     foundational service, but you may need to apply the AI-Gateway-
#     compatible values from
#     https://raw.githubusercontent.com/envoyproxy/ai-gateway/main/manifests/envoy-gateway-values.yaml
#     to enable the Extension Manager required by the AI Gateway).
#
# This manual installation is a workaround until the chart's
# envoyAIGateway.install flag is implemented:
#   https://github.com/nebari-dev/nebari-llm-serving-pack/issues/44
#
# References:
#   - https://aigateway.envoyproxy.io/docs/getting-started/installation/
#   - https://github.com/envoyproxy/ai-gateway
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-ai-gateway-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  source:
    chart: ai-gateway-crds-helm
    repoURL: oci://docker.io/envoyproxy
    targetRevision: v0.5.0

  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-ai-gateway-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-ai-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  source:
    chart: ai-gateway-helm
    repoURL: oci://docker.io/envoyproxy
    targetRevision: v0.5.0

  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-ai-gateway-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
