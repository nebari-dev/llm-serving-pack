# Envoy AI Gateway ArgoCD Applications.
#
# The AI Gateway is shipped as TWO separate Helm charts:
#   1. ai-gateway-crds-helm  - CRDs (AIGatewayRoute, AIServiceBackend,
#                              BackendSecurityPolicy, GatewayConfig, MCPRoute)
#   2. ai-gateway-helm       - Controller + webhooks
#
# Prerequisites:
#   - Kubernetes 1.32+
#   - Envoy Gateway v1.6+ installed WITH the AI-Gateway-compatible
#     values (extensionApis.enableBackend, extensionManager pointing at
#     this controller, backendResources allowing InferencePool). See
#     ./envoy-gateway.yaml for the complete configuration. Nebari
#     Infrastructure Core ships a bare Envoy Gateway install by
#     default - you MUST replace or supplement those values with the
#     ones in envoy-gateway.yaml or the pack's routing will 404 at
#     runtime.
#
# This manual installation is a workaround until the chart's
# envoyAIGateway.install flag is implemented:
#   https://github.com/nebari-dev/nebari-llm-serving-pack/issues/44
#
# References:
#   - https://aigateway.envoyproxy.io/docs/getting-started/installation/
#   - https://github.com/envoyproxy/ai-gateway
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-ai-gateway-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  source:
    chart: ai-gateway-crds-helm
    repoURL: oci://docker.io/envoyproxy
    targetRevision: v0.5.0

  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-ai-gateway-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-ai-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  source:
    chart: ai-gateway-helm
    repoURL: oci://docker.io/envoyproxy
    targetRevision: v0.5.0
    helm:
      values: |
        # GenAI distributed tracing -> self-hosted Langfuse (OTLP).
        #
        # controller.spanRequestHeaderAttributes maps an HTTP request header to
        # an OTel span attribute (format "header:attribute"). We copy the
        # x-client-id header onto the GenAI span as user.id. That header is the
        # matched API-key clientID (e.g. "user-chuck-1"), forwarded by
        # apiKeyAuth.forwardClientIDHeader on the operator-generated external
        # SecurityPolicy. Langfuse then attributes token usage per API-key owner
        # (per-key granularity; see docs/install-production.md).
        #
        # The extProc OpenInference tracer exports OTLP to Langfuse, configured
        # via the extProc.extraEnvVars below (see the chart-limitation note
        # there: the OTLP endpoint + auth header must be literal values).
        controller:
          spanRequestHeaderAttributes: "x-client-id:user.id"
        extProc:
          extraEnvVars:
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_SERVICE_NAME
              value: "nebari-llm-ai-gateway"
            # IMPORTANT: ai-gateway-helm v0.5.0 serializes extProc.extraEnvVars
            # into a single --extProcExtraEnvVars CLI arg and only honors a
            # literal `value:` — `valueFrom`/secretKeyRef renders as nil
            # (verified on a live cluster). So the endpoint and the Basic-auth
            # header MUST be literals here.
            #
            # SECURITY: OTEL_EXPORTER_OTLP_HEADERS contains the Langfuse project
            # secret key (base64 of "pk-...:sk-..."). With this chart there is
            # no secretKeyRef option, so it lands in the Helm values (i.e. in
            # your GitOps repo). Keep that repo private and/or encrypt this app
            # with SOPS/sealed-secrets. Upstream support for secret refs here is
            # a follow-up (ai-gateway-helm would need to stop flattening
            # extraEnvVars into a CLI arg).
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "https://langfuse.REPLACE-baseDomain/api/public/otel"
            - name: OTEL_EXPORTER_OTLP_HEADERS
              value: "Authorization=Basic REPLACE-base64-of-pk:sk"

  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-ai-gateway-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
