# Envoy AI Gateway ArgoCD Applications.
#
# The AI Gateway is shipped as TWO separate Helm charts:
#   1. ai-gateway-crds-helm  - CRDs (AIGatewayRoute, AIServiceBackend,
#                              BackendSecurityPolicy, GatewayConfig, MCPRoute)
#   2. ai-gateway-helm       - Controller + webhooks
#
# Prerequisites:
#   - Kubernetes 1.32+
#   - Envoy Gateway v1.6+ installed WITH the AI-Gateway-compatible
#     values (extensionApis.enableBackend, extensionManager pointing at
#     this controller, backendResources allowing InferencePool). See
#     ./envoy-gateway.yaml for the complete configuration. Nebari
#     Infrastructure Core ships a bare Envoy Gateway install by
#     default - you MUST replace or supplement those values with the
#     ones in envoy-gateway.yaml or the pack's routing will 404 at
#     runtime.
#
# This manual installation is a workaround until the chart's
# envoyAIGateway.install flag is implemented:
#   https://github.com/nebari-dev/nebari-llm-serving-pack/issues/44
#
# References:
#   - https://aigateway.envoyproxy.io/docs/getting-started/installation/
#   - https://github.com/envoyproxy/ai-gateway
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-ai-gateway-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  source:
    chart: ai-gateway-crds-helm
    repoURL: oci://docker.io/envoyproxy
    targetRevision: v0.5.0

  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-ai-gateway-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-ai-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: foundational

  source:
    chart: ai-gateway-helm
    repoURL: oci://docker.io/envoyproxy
    targetRevision: v0.5.0
    helm:
      values: |
        # Per-user token usage as a Grafana metric label (no Langfuse, no OTLP).
        #
        # controller.metricsRequestHeaderAttributes maps an HTTP request header
        # onto a label on the GenAI token-usage metric (format "header:label").
        # We copy the x-client-id header onto gen_ai_client_token_usage as
        # user.id (Prometheus label `user_id`). That header is the matched
        # API-key clientID (e.g. "user-chuck-1"), forwarded by
        # apiKeyAuth.forwardClientIDHeader on the operator-generated external
        # SecurityPolicy.
        #
        # COLLECTION: the gen_ai_* metrics are exposed on the extproc sidecar's
        # admin port (:1064 /metrics), NOT on envoy's :19001 /stats/prometheus.
        # The proxy pod's default prometheus.io/scrape annotation targets :19001
        # only, so a DEDICATED scrape job for :1064 must be added to the LGTM
        # OTel collector (see docs/install-production.md §14.2 for the
        # scrape_config). Then a Grafana table sums tokens per user.
        # See also the chart's observability.dashboard value.
        controller:
          metricsRequestHeaderAttributes: "x-client-id:user.id"

  destination:
    server: https://kubernetes.default.svc
    namespace: envoy-ai-gateway-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
