# Placeholder nginx config baked into the image so it runs standalone.
#
# In-cluster this file is replaced by the Helm-rendered nginx.conf (mounted from
# the frontend ConfigMap), which adds the /api/ reverse-proxy to the key-manager.
# This baked copy only serves the SPA + /config.json + /healthz.
#
# Listens on 8080 with all writable paths under /tmp so the container can run as
# a non-root user with a read-only root filesystem.
worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile        on;
    keepalive_timeout 65;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript
                   text/xml application/xml application/xml+rss text/javascript
                   image/svg+xml;
        gzip_min_length 1024;

        # Cache content-hashed static assets aggressively.
        location ~* \.(js|css|png|svg|ico|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # SPA fallback.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
